name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release-info:
    name: Release Info
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.info.outputs.app-version }}
      is-tag-release: ${{ steps.info.outputs.is-tag-release }}
      tag-name: ${{ steps.info.outputs.tag-name }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - id: info
        name: Read version
        run: |
          app_version="$(bun -e "console.log(JSON.parse(await Bun.file('apps/desktop/src-tauri/tauri.conf.json').text()).version)")"
          is_tag_release="${{ startsWith(github.ref, 'refs/tags/app-v') }}"
          tag_name="${GITHUB_REF_NAME}"

          if [[ "$is_tag_release" == "true" ]]; then
            tag_version="${tag_name#app-v}"
            if [[ "$tag_version" != "$app_version" ]]; then
              echo "Tag $tag_name does not match app version $app_version."
              exit 1
            fi
          fi

          {
            echo "app-version=$app_version"
            echo "is-tag-release=$is_tag_release"
            echo "tag-name=$tag_name"
          } >> "$GITHUB_OUTPUT"

  prepare-draft-release:
    name: Prepare Draft Release
    needs: release-info
    if: needs.release-info.outputs.is-tag-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-info.outputs.tag-name }}
          APP_VERSION: ${{ needs.release-info.outputs.app-version }}
        run: |
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            is_draft="$(gh release view "$TAG_NAME" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" != "true" ]]; then
              echo "Release $TAG_NAME already exists and is not a draft. Refusing to overwrite public assets."
              exit 1
            fi
            echo "Draft release $TAG_NAME already exists; build jobs will upload assets to it."
          else
            gh release create "$TAG_NAME" \
              --draft \
              --prerelease \
              --title "Tessera $APP_VERSION dry run" \
              --notes "Unsigned dry-run desktop builds for packaging validation. Do not publish these assets to end users."
          fi

  build-desktop:
    name: Build ${{ matrix.label }}
    needs:
      - release-info
      - prepare-draft-release
    if: >-
      always()
      && needs.release-info.result == 'success'
      && (needs.prepare-draft-release.result == 'success' || needs.prepare-draft-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-aarch64
            os: macos-15
            build-args: "-- --target aarch64-apple-darwin --bundles dmg"
            rust-targets: aarch64-apple-darwin
          - label: macos-x86_64
            os: macos-15-intel
            build-args: "-- --target x86_64-apple-darwin --bundles dmg"
            rust-targets: x86_64-apple-darwin
          - label: linux-x86_64
            os: ubuntu-22.04
            build-args: "-- --bundles appimage,deb"
            rust-targets: ""
          - label: windows-x86_64
            os: windows-latest
            build-args: "-- --bundles nsis,msi"
            rust-targets: ""
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust-targets == ''
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust-targets != ''
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          FUSE_PACKAGE=libfuse2
          if apt-cache show libfuse2t64 > /dev/null 2>&1; then
            FUSE_PACKAGE=libfuse2t64
          fi
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            wget \
            "$FUSE_PACKAGE"
      - run: bun install --frozen-lockfile
      - name: Build desktop bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.os, 'macos') && '-' || '' }}
        run: bun run --filter @tessera/desktop build ${{ matrix.build-args }}
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tessera-${{ matrix.label }}
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/**/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/**/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/**/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/**/release/bundle/**/*.msi
      - name: Upload draft release assets
        if: needs.release-info.outputs.is-tag-release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-info.outputs.tag-name }}
        run: |
          assets_file="$RUNNER_TEMP/release-assets.txt"
          find apps/desktop/src-tauri/target -type f \( \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.dmg" -o \
            -name "*.exe" -o \
            -name "*.msi" \
          \) -print > "$assets_file"

          if [[ ! -s "$assets_file" ]]; then
            echo "No release assets were produced."
            exit 1
          fi

          while IFS= read -r asset; do
            gh release upload "$TAG_NAME" "$asset" --clobber
          done < "$assets_file"
