name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            desktop-build-args: "-- --bundles deb"
          - os: macos-latest
            desktop-build-args: "-- --bundles app"
          - os: windows-latest
            desktop-build-args: ""
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          FUSE_PACKAGE=libfuse2
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            FUSE_PACKAGE=libfuse2t64
          fi
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            wget \
            "$FUSE_PACKAGE"
      - run: bun install --frozen-lockfile
      - name: Compile sidecar and CLI binaries
        run: bun run build:sidecar
      - run: bun run --filter @tessera/desktop build ${{ matrix.desktop-build-args }}
